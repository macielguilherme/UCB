<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário Acadêmico · Católica</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <style>
    :root {
      --deep-blue: #0a2e5a;
      --primary-blue: #004a99;
      --soft-blue: #e2edf9;
      --white: #ffffff;
      --bg-color: #f4f8fb;
      --card-shadow: 0 12px 32px -8px rgba(0, 40, 70, 0.1), 0 4px 12px rgba(0, 40, 70, 0.04);
      --text-primary: #1e2b3c;
      --text-soft: #5b6f84;
      --border-radius-card: 28px;
      --accent-color: #f39c12;
      --transition-speed: 0.3s;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    html, body {
      max-width: 100%;
      overflow-x: hidden;
      width: 100%;
    }

    body {
      font-family: "Inter", sans-serif;
      background: linear-gradient(135deg, var(--bg-color) 0%, #e9f0f7 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--white);
      padding: 1rem 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0, 74, 153, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo { max-height: 40px; width: auto; }

    h1 {
      color: var(--deep-blue);
      font-size: 1.2rem;
      font-weight: 700;
      border-left: 3px solid var(--primary-blue);
      padding-left: 1rem;
    }

    /* === MENU LATERAL (30%) === */
    .hamburger-button {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; gap: 5px;
      width: 44px; height: 44px; align-items: center; justify-content: center;
      z-index: 1100; position: relative;
    }

    .hamburger-button span {
      display: block; width: 24px; height: 2.5px;
      background: var(--deep-blue); border-radius: 3px;
      transition: var(--transition-speed);
    }

    .hamburger-button.active span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger-button.active span:nth-child(2) { opacity: 0; }
    .hamburger-button.active span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    .hamburger-dropdown {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 30%; min-width: 280px;
      background: var(--white);
      box-shadow: -10px 0 30px rgba(0,0,0,0.1);
      visibility: hidden; transform: translateX(100%);
      transition: transform var(--transition-speed) ease, visibility var(--transition-speed);
      z-index: 1000; padding-top: 80px;
    }

    .hamburger-dropdown.active { visibility: visible; transform: translateX(0); }

    .hamburger-dropdown a {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px; color: var(--text-primary);
      text-decoration: none; font-weight: 500;
    }

    /* === CONTEÚDO === */
    main { padding: 1.5rem 5%; max-width: 800px; margin: 0 auto; width: 100%; flex: 1; }

    .calendar-container {
      background: var(--white); border-radius: var(--border-radius-card);
      box-shadow: var(--card-shadow); padding: 1.5rem; width: 100%;
    }

    .calendar-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem;
    }

    .calendar-header h2 { color: var(--deep-blue); font-size: 1.4rem; text-transform: capitalize; }

    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }

    .weekday { text-align: center; font-size: 0.75rem; color: var(--text-soft); font-weight: 700; padding-bottom: 8px; }

    .calendar-day {
      aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      font-weight: 600; cursor: pointer; border-radius: 12px; position: relative; font-size: 0.95rem;
    }

    .calendar-day.today { background: var(--primary-blue); color: white; }

    /* Múltiplos pontos se houver mais de um evento no dia */
    .dot-container {
      position: absolute; bottom: 4px; display: flex; gap: 2px;
    }
    .event-dot { width: 4px; height: 4px; background: var(--accent-color); border-radius: 50%; }

    .details-area { margin-top: 1.5rem; }

    .event-card {
      background: var(--white); padding: 1.2rem; border-radius: 20px;
      display: flex; gap: 1.2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border-left: 6px solid var(--primary-blue); animation: slideIn 0.3s ease;
      margin-bottom: 10px;
    }

    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .event-card-date .d { font-size: 1.8rem; font-weight: 800; color: var(--primary-blue); display: block; }
    .event-card-date .m { font-size: 0.8rem; font-weight: 700; color: var(--text-soft); text-transform: uppercase; }

    .event-card-info .subject { 
      font-size: 0.65rem; font-weight: 700; color: var(--primary-blue);
      background: var(--soft-blue); padding: 3px 10px; border-radius: 20px;
      margin-bottom: 6px; display: inline-block;
    }

    @media (max-width: 600px) {
      .hamburger-dropdown { width: 80%; }
      header { padding: 1rem; }
      h1 { font-size: 1rem; }
      .event-card { flex-direction: column; gap: 0.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Logomarca_Universidade_Catolica_de_Brasilia.svg/1280px-Logomarca_Universidade_Catolica_de_Brasilia.svg.png" alt="Logo UCB" class="logo">
    <h1>Calendário Acadêmico</h1>
  </div>
  <button class="hamburger-button" id="hamburgerButton" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
  <div class="hamburger-dropdown" id="hamburgerDropdown">
    <a href="#"><span class="material-symbols-outlined">person</span> Meu perfil</a>
    <a href="#"><span class="material-symbols-outlined">assignment</span> Atividades</a>
    <a href="#"><span class="material-symbols-outlined">school</span> Trilha de Aprendizagem</a>
  </div>
</header>

<main>
  <div class="calendar-container">
    <div class="calendar-header">
      <h2 id="currentMonthYear"></h2>
      <div class="calendar-nav">
        <button class="nav-btn" onclick="prevMonth()"><span class="material-symbols-outlined">chevron_left</span></button>
        <button class="nav-btn" onclick="nextMonth()"><span class="material-symbols-outlined">chevron_right</span></button>
      </div>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
  <div class="details-area" id="detailsArea"></div>
</main>

<script>
let currentDate = new Date(2026, 1, 1); 

const MATERIA_UX = "EXPERIÊNCIA DO USUÁRIO (UX) - GEE39I10089";
const MATERIA_COMP = "TEORIA GERAL DA COMPUTAÇÃO - GEE01I10375";

// BANCO DE DADOS ATUALIZADO (UX + TEORIA DA COMPUTAÇÃO)
const trilaEventos = {
    // FEVEREIRO 2026
    "20260123": [
        { subject: MATERIA_UX, title: "Início do Módulo I", desc: "Conteúdo disponível no AVA." },
        { subject: MATERIA_COMP, title: "Início do Módulo I", desc: "Conteúdo disponível no AVA." }
    ],
    "20260126": [
        { subject: MATERIA_UX, title: "Atividade no AVA", desc: "Abertura do Fórum – Unidade I" },
        { subject: MATERIA_COMP, title: "Atividade no AVA", desc: "Abertura do Fórum – Unidade I" }
    ],
    // MARÇO 2026
    "20260202": [
        { subject: MATERIA_UX, title: "Atividade no AVA", desc: "Abertura da QME – Unidade II" },
        { subject: MATERIA_COMP, title: "Atividade no AVA", desc: "Abertura da QME – Unidade II" }
    ],
    "20260209": [
        { subject: MATERIA_UX, title: "Atividade no AVA", desc: "Abertura da Atividade Aberta - Unidade III" }
    ],
    "20260216": [
        { subject: MATERIA_UX, title: "Atividade no AVA", desc: "Abertura da QME - Unidade IV" }
    ],
    "20260223": [
        { subject: MATERIA_UX, title: "Agendamento", desc: "Início do período de agendamento para provas presenciais." },
        { subject: MATERIA_COMP, title: "Agendamento", desc: "Início do período de agendamento para as provas presenciais." }
    ],
    "20260227": [
        { subject: MATERIA_UX, title: "Encerramento AVA", desc: "Fim do Fórum (U1) e Atividade Aberta (U3)." },
        { subject: MATERIA_COMP, title: "Encerramento AVA", desc: "Encerramento do Fórum - Unidade I" }
    ],
    "20260229": [
        { subject: MATERIA_UX, title: "Fim Agendamento", desc: "Encerramento do período de agendamento." },
        { subject: MATERIA_COMP, title: "Fim Agendamento", desc: "Encerramento do período de agendamento." }
    ],
    // ABRIL 2026
    "20260301": [
        { subject: MATERIA_UX, title: "Fim QMEs", desc: "Fim do prazo para Unidades II e IV." },
        { subject: MATERIA_COMP, title: "Fim QME", desc: "Encerramento da QME - Unidade II" }
    ],
    "20260306": [
        { subject: MATERIA_UX, title: "Avaliação Presencial", desc: "Início das provas presenciais." },
        { subject: MATERIA_COMP, title: "Avaliação Presencial", desc: "Início do período para a realização das provas." }
    ],
    "20260312": [
        { subject: MATERIA_UX, title: "Avaliação Presencial", desc: "Fim das provas presenciais." },
        { subject: MATERIA_COMP, title: "Avaliação Presencial", desc: "Fim do período para a realização das provas." }
    ],
    "20260317": [
        { subject: MATERIA_UX, title: "Agendamento Sub.", desc: "Início do agendamento para provas substitutivas." },
        { subject: MATERIA_COMP, title: "Agendamento Sub.", desc: "Início do agendamento para substitutivas presenciais." }
    ],
    "20260318": [
        { subject: MATERIA_COMP, title: "Agendamento Sub.", desc: "Continuidade do agendamento para substitutivas." }
    ],
    "20260323": [
        { subject: MATERIA_UX, title: "Avaliação Sub.", desc: "Início das provas substitutivas." },
        { subject: MATERIA_COMP, title: "Avaliação Sub.", desc: "Início do período para provas substitutivas." }
    ],
    "20260325": [
        { subject: MATERIA_UX, title: "Avaliação Sub.", desc: "Fim das provas substitutivas." },
        { subject: MATERIA_COMP, title: "Avaliação Sub.", desc: "Fim do período para provas substitutivas." }
    ],
    "20260330": [
        { subject: MATERIA_UX, title: "Encerramento Módulo", desc: "Conclusão oficial do Módulo I." },
        { subject: MATERIA_COMP, title: "Encerramento Módulo", desc: "Conclusão do Módulo." }
    ]
};

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  const monthYear = document.getElementById('currentMonthYear');
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  
  const names = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
  monthYear.innerText = `${names[month]} ${year}`;
  
  grid.innerHTML = '';
  ['D','S','T','Q','Q','S','S'].forEach(d => {
    const el = document.createElement('div'); el.className='weekday'; el.innerText=d; grid.appendChild(el);
  });

  const first = new Date(year, month, 1).getDay();
  const last = new Date(year, month + 1, 0).getDate();

  for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));

  for(let i=1; i<=last; i++) {
    const day = document.createElement('div');
    day.className = 'calendar-day';
    day.innerHTML = `<span>${i}</span>`;
    
    const key = `${year}${String(month).padStart(2, '0')}${String(i).padStart(2, '0')}`;
    
    if(trilaEventos[key]) {
      const dotContainer = document.createElement('div');
      dotContainer.className = 'dot-container';
      // Adiciona um pontinho para cada evento no dia
      trilaEventos[key].forEach(() => {
        const dot = document.createElement('div');
        dot.className = 'event-dot';
        dotContainer.appendChild(dot);
      });
      day.appendChild(dotContainer);
      day.onclick = () => showDetails(key, i, names[month]);
    }
    grid.appendChild(day);
  }
}

function showDetails(key, day, monthName) {
  const events = trilaEventos[key];
  const area = document.getElementById('detailsArea');
  area.innerHTML = ''; // Limpa antes de renderizar os novos cards
  
  events.forEach(ev => {
    area.innerHTML += `
      <div class="event-card">
        <div class="event-card-date"><span class="d">${day}</span><span class="m">${monthName.substring(0,3)}</span></div>
        <div class="event-card-info">
          <span class="subject">${ev.subject}</span>
          <h3>${ev.title}</h3><p>${ev.desc}</p>
        </div>
      </div>`;
  });
}

function prevMonth() { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
function nextMonth() { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }
function toggleMenu() {
  document.getElementById('hamburgerButton').classList.toggle('active');
  document.getElementById('hamburgerDropdown').classList.toggle('active');
}

document.addEventListener('DOMContentLoaded', renderCalendar);
</script>
</body>
</html>
