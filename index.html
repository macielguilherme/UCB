<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Acadêmico · Católica</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

<style>
:root {
  --deep-blue: #0a2e5a;
  --primary-blue: #004a99;
  --soft-blue: #e2edf9;
  --white: #ffffff;
  --card-shadow: 0 18px 30px -10px rgba(0,40,70,0.12), 0 4px 12px rgba(0,40,70,0.03);
  --text-primary: #1e2b3c;
  --text-soft: #4b5f73;
  --border-radius-card: 24px;
}

body {
  margin: 0; padding: 0; font-family: "Inter", system-ui, -apple-system, sans-serif;
  background: #f6fafd; color: var(--text-primary); line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column;
}

header {
  background: var(--white); padding: 1.2rem 5%; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(0,74,153,0.15); box-shadow: 0 2px 8px rgba(0,0,0,0.02); position: relative;
}
.header-left { display: flex; align-items: center; gap: 2rem; }
.logo { max-height: 64px; width: auto; object-fit: contain; }
h1 { color: var(--deep-blue); font-size: 1.9rem; font-weight: 600; letter-spacing: -0.02em; border-left: 3px solid var(--primary-blue); padding-left: 1.5rem; }

/* Menu Hambúrguer */
.hamburger-menu { position: relative; }
.hamburger-button {
  background: none; border: none; cursor: pointer; padding: 0.5rem; display: flex; flex-direction: column; gap: 6px; width: 40px; height: 40px;
  justify-content: center; border-radius: 8px; transition: 0.2s;
}
.hamburger-button:hover { background-color: var(--soft-blue); }
.hamburger-button span { display: block; width: 100%; height: 3px; background: var(--deep-blue); border-radius: 3px; transition: 0.3s; }
.hamburger-button.active span:nth-child(1){transform:translateY(9px) rotate(45deg);}
.hamburger-button.active span:nth-child(2){opacity:0;}
.hamburger-button.active span:nth-child(3){transform:translateY(-9px) rotate(-45deg);}

.hamburger-dropdown {
  position: absolute; top: 60px; right: 0; background: var(--white); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  min-width: 220px; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s; z-index: 100; border: 1px solid rgba(0,74,153,0.1); overflow: hidden;
}
.hamburger-dropdown.active { opacity: 1; visibility: visible; transform: translateY(0);}
.hamburger-dropdown ul { list-style: none; margin: 0; padding: 0;}
.hamburger-dropdown li { border-bottom: 1px solid rgba(0,74,153,0.05);}
.hamburger-dropdown li:last-child { border-bottom: none; }
.hamburger-dropdown a { 
  display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: var(--text-primary); 
  text-decoration: none; font-weight: 500; transition: background 0.2s;
}
.hamburger-dropdown a:hover { background: var(--soft-blue); color: var(--primary-blue); }
.hamburger-dropdown .material-symbols-outlined { color: var(--primary-blue); font-size: 22px; }

main { padding: 3rem 5%; max-width: 900px; margin: 0 auto; width: 100%; flex: 1; }

/* Calendário */
.calendar-container {
  background: var(--white);
  border-radius: var(--border-radius-card);
  box-shadow: var(--card-shadow);
  padding: 2.5rem;
  border: 1px solid rgba(0,74,153,0.05);
}

.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2.5rem;
}

.calendar-header h2 {
  color: var(--deep-blue);
  font-size: 1.8rem;
  margin: 0;
  font-weight: 700;
  text-transform: capitalize;
}

.calendar-nav { display: flex; gap: 1rem; }

.nav-btn {
  background: var(--soft-blue);
  border: none;
  color: var(--primary-blue);
  width: 44px;
  height: 44px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.nav-btn:hover {
  background: var(--primary-blue);
  color: var(--white);
  transform: translateY(-2px);
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.weekday {
  text-align: center;
  font-weight: 700;
  color: var(--text-soft);
  padding: 10px 0;
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.calendar-day {
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 14px;
  font-weight: 500;
  transition: 0.2s;
  cursor: pointer;
  font-size: 1.1rem;
  color: var(--text-primary);
  background: transparent;
}

.calendar-day:hover:not(.empty) {
  background-color: var(--soft-blue);
  color: var(--primary-blue);
}

.calendar-day.today {
  background-color: var(--primary-blue) !important;
  color: var(--white) !important;
  font-weight: 700;
  box-shadow: 0 8px 15px rgba(0, 74, 153, 0.25);
}

.calendar-day.empty { cursor: default; }

.footer-note { 
  text-align: center; margin-top: 3rem; color: var(--text-soft); 
  font-size: 0.9rem; opacity: 0.6; border-top: 1px dashed rgba(0,74,153,0.15); padding-top: 2rem; 
}

@media (max-width: 600px) {
  h1 { font-size: 1.3rem; padding-left: 0.8rem; }
  .logo { max-height: 45px; }
  main { padding: 1.5rem 5%; }
  .calendar-container { padding: 1.5rem; }
  .calendar-day { font-size: 1rem; }
  .calendar-header h2 { font-size: 1.4rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Logomarca_Universidade_Catolica_de_Brasilia.svg/1280px-Logomarca_Universidade_Catolica_de_Brasilia.svg.png" alt="Logo UCB" class="logo">
    <h1>Calendário Acadêmico · Católica</h1>
  </div>

  <div class="hamburger-menu">
    <button class="hamburger-button" id="hamburgerButton" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
    <div class="hamburger-dropdown" id="hamburgerDropdown">
      <ul>
        <li>
          <a href="#">
            <span class="material-symbols-outlined">person</span>
            Meu perfil
          </a>
        </li>
        <li>
          <a href="#">
            <span class="material-symbols-outlined">assignment</span>
            Atividades
          </a>
        </li>
      </ul>
    </div>
  </div>
</header>

<main>
  <div class="calendar-container">
    <div class="calendar-header">
      <h2 id="currentMonthYear">Março 2026</h2>
      <div class="calendar-nav">
        <button class="nav-btn" onclick="prevMonth()" title="Mês Anterior">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <button class="nav-btn" onclick="nextMonth()" title="Próximo Mês">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
    </div>
    
    <div class="calendar-grid" id="calendarGrid">
      </div>
  </div>
  
  <div class="footer-note">planejamento e organização para o seu sucesso acadêmico · Católica</div>
</main>

<div vw class="enabled"><div vw-access-button class="active"></div><div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div></div>

<script>
let currentDate = new Date();

function renderCalendar() {
  const monthYearElement = document.getElementById('currentMonthYear');
  const calendarGrid = document.getElementById('calendarGrid');
  
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  
  const monthNames = [
    "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
    "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
  ];
  
  monthYearElement.innerText = `${monthNames[month]} ${year}`;
  
  // Limpar grid
  calendarGrid.innerHTML = '';
  
  // Cabeçalho dos dias
  const daysOfWeek = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
  daysOfWeek.forEach(day => {
    const dayDiv = document.createElement('div');
    dayDiv.className = 'weekday';
    dayDiv.innerText = day;
    calendarGrid.appendChild(dayDiv);
  });
  
  // Cálculos do mês
  const firstDayOfMonth = new Date(year, month, 1).getDay();
  const lastDateOfMonth = new Date(year, month + 1, 0).getDate();
  
  // Espaços vazios do início
  for (let i = 0; i < firstDayOfMonth; i++) {
    const emptyDiv = document.createElement('div');
    emptyDiv.className = 'calendar-day empty';
    calendarGrid.appendChild(emptyDiv);
  }
  
  const today = new Date();
  
  // Dias do mês
  for (let i = 1; i <= lastDateOfMonth; i++) {
    const dayDiv = document.createElement('div');
    dayDiv.className = 'calendar-day';
    dayDiv.innerText = i;
    
    if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
      dayDiv.classList.add('today');
    }
    
    calendarGrid.appendChild(dayDiv);
  }
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
}

// Controle do Menu
function toggleMenu(){
  document.getElementById('hamburgerButton').classList.toggle('active');
  document.getElementById('hamburgerDropdown').classList.toggle('active');
}

// Fechar menu ao clicar fora
document.addEventListener('click', function(e){
  const button = document.getElementById('hamburgerButton');
  const dropdown = document.getElementById('hamburgerDropdown');
  if (button && dropdown && !button.contains(e.target) && !dropdown.contains(e.target)) {
    button.classList.remove('active');
    dropdown.classList.remove('active');
  }
});

// VLibras
function carregarVLibras() {
  const script = document.createElement('script');
  script.src = 'https://vlibras.gov.br/app/vlibras-plugin.js';
  script.onload = function() {
    if (window.VLibras) new window.VLibras.Widget('https://vlibras.gov.br/app');
  };
  document.head.appendChild(script);
}

// Inicialização
document.addEventListener('DOMContentLoaded', () => {
  renderCalendar();
  setTimeout(carregarVLibras, 1500);
});
</script>

</body>
</html>
